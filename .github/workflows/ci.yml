name: CI

# On push/PR: install dependencies, smoke-run the whole pipeline on a small
# synthetic dataset, and run the testthat suite (reproducibility, attrition,
# anomaly catch). Runs in rocker/r2u so install.packages() pulls precompiled
# binaries (incl. duckdb) — no source compilation.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: rocker/r2u:22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System tooling
        run: |
          apt-get update && apt-get install -y --no-install-recommends make
          rm -rf /var/lib/apt/lists/*

      - name: Install R packages
        run: install2.r --error --skipinstalled DBI duckdb survival ggplot2 testthat

      - name: Pipeline smoke run (small N, no dashboard)
        env:
          N_MEMBERS: "3000"
          RWE_SEED: "20260528"
        run: make data cohort exposure outcome analysis qc

      - name: Run tests
        run: make test
